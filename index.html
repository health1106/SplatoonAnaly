<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スプラ試合動画解析ツール(超特急・画像一致版)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f0f0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .flex-container { display: flex; gap: 20px; }
        .video-side { flex: 1; }
        .analyzer-side { flex: 1; }
        video { width: 100%; max-width: 640px; margin-top: 10px; border: 1px solid #ccc; }
        
        canvas { display: none; }
        
        .control-btns { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; transition: background-color 0.2s; }
        #autoAnalyzeBtn { background-color: #ff5722; color: white; font-weight: bold; font-size: 18px; width: 100%; }
        #autoAnalyzeBtn:hover { background-color: #e64a19; }
        #downloadCsvBtn { background-color: #28a745; color: white; margin-top: 15px; }
        #downloadCsvBtn:hover { background-color: #218838; }
        #status { font-weight: bold; margin-top: 5px; color: #333; display: block; line-height: 1.4; }
        
        #resultTable { width: 100%; margin-top: 20px; border-collapse: collapse; }
        #resultTable th, #resultTable td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        #resultTable th { background-color: #f2f2f2; }

        /* 調整パネルのスタイル */
        .debug-panel { margin-top: 25px; padding: 15px; background: #fff; border: 2px dashed #ff5722; border-radius: 8px; }
        .debug-group { margin-bottom: 12px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .debug-btn { padding: 4px 8px; font-size: 13px; background: #e0e0e0; border-radius: 3px; }
        .debug-btn:hover { background: #d0d0d0; }
        .debug-btn.heavy { background: #b0bec5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>スプラ試合動画解析ツール 🚀</h1>
        <div class="flex-container">
            <div class="video-side">
                <p>① 動画ファイルを選択</p>
                <input type="file" id="videoInput" accept="video/*">
                <br>
                <video id="videoPlayer" controls crossorigin="anonymous"></video>
                <div class="control-btns">
                    <button id="autoAnalyzeBtn">⚡ 動画全体を超特急自動解析 (AIなし)</button>
                    <span id="status">動画を選択してください。</span>
                </div>
            </div>
            
            <div class="analyzer-side">
                <p>② 解析検知プレビュー (2値化済)</p>
                <div id="previewArea">
                    <p>【デス判定枠】</p>
                    <canvas id="canvasDeath" style="display:block; border:2px solid red; margin-bottom:10px; max-width:300px; background:#000;"></canvas>
                    <p>【キル判定枠】</p>
                    <canvas id="canvasKill" style="display:block; border:2px solid red; max-width:300px; background:#000;"></canvas>
                </div>
            </div>
        </div>
        
        <!-- 🛠️ リアルタイム位置微調整パネル -->
        <div class="debug-panel">
            <h3>🛠️ リアルタイム位置微調整パネル (GitHub更新不要！)</h3>
            <p style="font-size: 0.9em; color: #555; margin-top: -5px;">動画をキル/デスの瞬間で一時停止し、文字が赤枠のど真ん中に収まるようボタンで動かしてください。スコアが跳ね上がります。</p>
            
            <div class="debug-group">
                <strong>💀 デス枠位置 — Y軸(上下):</strong> <span id="valDeathY" style="font-weight:bold; color:#ff5722;">317</span>
                <button class="debug-btn heavy" onclick="adjustPos('death','y',-5)">↑大幅上</button>
                <button class="debug-btn" onclick="adjustPos('death','y',-1)">↑上</button>
                <button class="debug-btn" onclick="adjustPos('death','y',1)">↓下</button>
                <button class="debug-btn heavy" onclick="adjustPos('death','y',5)">↓大幅下</button>
                &nbsp;&nbsp;<strong>X軸(左右):</strong> <span id="valDeathX" style="font-weight:bold; color:#ff5722;">601</span>
                <button class="debug-btn" onclick="adjustPos('death','x',-1)">←左</button>
                <button class="debug-btn" onclick="adjustPos('death','x',1)">→右</button>
            </div>
            
            <div class="debug-group">
                <strong>⚔️ キル枠位置 — Y軸(上下):</strong> <span id="valKillY" style="font-weight:bold; color:#007bff;">632</span>
                <button class="debug-btn heavy" onclick="adjustPos('kill','y',-5)">↑大幅上</button>
                <button class="debug-btn" onclick="adjustPos('kill','y',-1)">↑上</button>
                <button class="debug-btn" onclick="adjustPos('kill','y',1)">↓下</button>
                <button class="debug-btn heavy" onclick="adjustPos('kill','y',5)">↓大幅下</button>
                &nbsp;&nbsp;<strong>X軸(左右):</strong> <span id="valKillX" style="font-weight:bold; color:#007bff;">607</span>
                <button class="debug-btn" onclick="adjustPos('kill','x',-1)">←左</button>
                <button class="debug-btn" onclick="adjustPos('kill','x',1)">→右</button>
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
            <h2>📊 解析結果記録 (画像一致方式)</h2>
            <button id="downloadCsvBtn">CSVファイルをダウンロード</button>
        </div>
        
        <table id="resultTable">
            <thead>
                <tr>
                    <th>経過時間</th>
                    <th>判定イベント</th>
                    <th>一致度スコア</th>
                </tr>
            </thead>
            <tbody id="resultBody">
            </tbody>
        </table>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const autoAnalyzeBtn = document.getElementById('autoAnalyzeBtn');
        const downloadCsvBtn = document.getElementById('downloadCsvBtn');
        const statusSpan = document.getElementById('status');
        const resultBody = document.getElementById('resultBody');
        
        const canvasDeath = document.getElementById('canvasDeath');
        const canvasKill = document.getElementById('canvasKill');

        // 1280x720基準の初期想定座標（ボタン操作でリアルタイムに変更されます）
        let targetDeath = { x: 601, y: 317, w: 117, h: 41 };
        let targetKill  = { x: 607, y: 632, w: 98,  h: 29 };

        const RESOLUTION_W = 1280;
        const RESOLUTION_H = 720;

        const analysisData = [];
        let isAnalyzing = false;

        // テンプレート画像の読み込み
        const imgKillTemplate = new Image(); imgKillTemplate.src = 'template_kill.png';
        const imgDeathTemplate = new Image(); imgDeathTemplate.src = 'template_death.png';

        // 微調整パネルのボタンアクション
        window.adjustPos = function(type, axis, val) {
            if (type === 'death') {
                targetDeath[axis] += val;
                document.getElementById('valDeathX').textContent = targetDeath.x;
                document.getElementById('valDeathY').textContent = targetDeath.y;
            } else {
                targetKill[axis] += val;
                document.getElementById('valKillX').textContent = targetKill.x;
                document.getElementById('valKillY').textContent = targetKill.y;
            }
            // 座標が動いたので、現在のコマで即座に再計算して画面枠を更新
            analyzeFrameImageMatch();
        };

        videoInput.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                videoPlayer.src = URL.createObjectURL(e.target.files[0]);
                statusSpan.textContent = '動画を読み込みました。いつでも解析可能です！';
            }
        });
        
        // 動画の手動シーク（タイムスタンプ移動）が完了したときもプレビューを即更新する
        videoPlayer.addEventListener('seeked', analyzeFrameImageMatch);

        // 画像をパキッとした白黒（2値化）に変換する関数
        function binarizeContext(ctx, w, h) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const v = (0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2]);
                const color = (v > 150) ? 255 : 0; // 文字の白を拾いやすくするため150に調整
                data[i] = data[i+1] = data[i+2] = color;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // 白黒画像同士のドット引き算（一致度％）を計算する関数
        function calculateMatchRate(ctxVideo, imgTemplate, w, h) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w; tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(imgTemplate, 0, 0, w, h);
            binarizeContext(tempCtx, w, h);

            const vData = ctxVideo.getImageData(0, 0, w, h).data;
            const tData = tempCtx.getImageData(0, 0, w, h).data;

            let matchPixels = 0;
            const totalPixels = w * h;

            for (let i = 0; i < vData.length; i += 4) {
                if (vData[i] === tData[i]) {
                    matchPixels++;
                }
            }
            return (matchPixels / totalPixels) * 100;
        }

        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        async function analyzeFrameImageMatch() {
            if (!videoPlayer.videoWidth) return;

            const displayWidth = videoPlayer.clientWidth || 640;
            const displayHeight = videoPlayer.clientHeight || 360;

            const scaleX = videoPlayer.videoWidth / displayWidth;
            const scaleY = videoPlayer.videoHeight / displayHeight;

            // 再生中動画の実解像度に合わせて切り出し座標をマッピング
            const cDeath = {
                x: (targetDeath.x / RESOLUTION_W) * displayWidth * scaleX,
                y: (targetDeath.y / RESOLUTION_H) * displayHeight * scaleY,
                w: targetDeath.w * (videoPlayer.videoWidth / RESOLUTION_W),
                h: targetDeath.h * (videoPlayer.videoHeight / RESOLUTION_H)
            };

            const cKill = {
                x: (targetKill.x / RESOLUTION_W) * displayWidth * scaleX,
                y: (targetKill.y / RESOLUTION_H) * displayHeight * scaleY,
                w: targetKill.w * (videoPlayer.videoWidth / RESOLUTION_W),
                h: targetKill.h * (videoPlayer.videoHeight / RESOLUTION_H)
            };

            const mainCanvas = document.createElement('canvas');
            mainCanvas.width = videoPlayer.videoWidth; 
            mainCanvas.height = videoPlayer.videoHeight;
            const mainCtx = mainCanvas.getContext('2d');
            mainCtx.drawImage(videoPlayer, 0, 0, videoPlayer.videoWidth, videoPlayer.videoHeight);

            // デス枠切り出し
            canvasDeath.width = cDeath.w; canvasDeath.height = cDeath.h;
            const ctxDeath = canvasDeath.getContext('2d');
            ctxDeath.drawImage(mainCanvas, cDeath.x, cDeath.y, cDeath.w, cDeath.h, 0, 0, cDeath.w, cDeath.h);
            binarizeContext(ctxDeath, cDeath.w, cDeath.h);

            // キル枠切り出し
            canvasKill.width = cKill.w; canvasKill.height = cKill.h;
            const ctxKill = canvasKill.getContext('2d');
            ctxKill.drawImage(mainCanvas, cKill.x, cKill.y, cKill.w, cKill.h, 0, 0, cKill.w, cKill.h);
            binarizeContext(ctxKill, cKill.w, cKill.h);

            // スコア算出
            const deathScore = calculateMatchRate(ctxDeath, imgDeathTemplate, cDeath.w, cDeath.h);
            const killScore = calculateMatchRate(ctxKill, imgKillTemplate, cKill.w, cKill.h);

            // ステータス表示の更新
            statusSpan.innerHTML = `📊 現在のリアルタイムスコア — デス: <span style="color:#ff5722;">${deathScore.toFixed(1)}%</span> / キル: <span style="color:#007bff;">${killScore.toFixed(1)}%</span><br>` +
                                   `<small>動画本来の解像度: ${videoPlayer.videoWidth}x${videoPlayer.videoHeight} | ターゲット座標: デス(${targetDeath.x}, ${targetDeath.y}) キル(${targetKill.x}, ${targetKill.y})</small>`;

            let eventType = '';
            let scoreStr = '';

            // ノイズを回避するため、ボーダーを88%まで引き上げます
            if (killScore > 88) {
                eventType = '⚔️ キル（たおした！）';
                scoreStr = `キル枠一致度: ${killScore.toFixed(1)}%`;
            } else if (deathScore > 88) {
                eventType = '💥 デス（やられた！）';
                scoreStr = `デス枠一致度: ${deathScore.toFixed(1)}%`;
            }

            // 自動解析中のみ、イベントを検知したら記録を追記
            if (eventType !== '' && isAnalyzing) {
                const currentTimeStr = formatTime(videoPlayer.currentTime);
                const lastLog = analysisData[analysisData.length - 1];

                if (!lastLog || lastLog.time !== currentTimeStr || lastLog.action !== eventType) {
                    analysisData.push({ time: currentTimeStr, action: eventType, score: scoreStr });

                    const newRow = document.createElement('tr');
                    newRow.innerHTML = `
                        <td><strong>${currentTimeStr}</strong></td>
                        <td><span style="background:#eee; border-radius:4px; padding:2px 6px; font-weight:bold;">${eventType}</span></td>
                        <td><span style="color:#666; font-size:0.9em;">${scoreStr}</span></td>
                    `;
                    resultBody.appendChild(newRow);
                }
            }
        }

        // 自動解析ボタンのループ処理
        autoAnalyzeBtn.addEventListener('click', async function() {
            if (!videoPlayer.src) return alert('動画を選択してください。');
            if (isAnalyzing) {
                isAnalyzing = false;
                autoAnalyzeBtn.textContent = '⚡ 動画全体を超特急自動解析 (AIなし)';
                return;
            }

            isAnalyzing = true;
            autoAnalyzeBtn.textContent = '⏹️ 解析を停止する';
            videoPlayer.pause();
            videoPlayer.currentTime = 0;

            const waitForSeek = () => new Promise(resolve => videoPlayer.onseeked = resolve);

            while (isAnalyzing && videoPlayer.currentTime < videoPlayer.duration) {
                await waitForSeek();
                await analyzeFrameImageMatch();
                videoPlayer.currentTime += 1.0; // 1秒刻みシーク
            }

            if (isAnalyzing) {
                isAnalyzing = false;
                autoAnalyzeBtn.textContent = '⚡ 動画全体を超特急自動解析 (AIなし)';
                statusSpan.innerHTML = '🏁 すべての超特急解析が完了しました！';
            }
        });

        // CSV出力
        downloadCsvBtn.addEventListener('click', function() {
            if (analysisData.length === 0) return alert('データがありません。');
            let csv = '経過時間,判定イベント,詳細\n';
            analysisData.forEach(row => { csv += `"${row.time}","${row.action}","${row.score}"\n`; });
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `splatoon_fast_log_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        });
    </script>
</body>
</html>
