<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スプラ試合動画解析ツール(超特急・画像一致版)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background: #f0f0f0; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .flex-container { display: flex; gap: 20px; }
        .video-side { flex: 1; }
        .analyzer-side { flex: 1; }
        video { width: 100%; max-width: 640px; margin-top: 10px; border: 1px solid #ccc; }
        
        canvas { display: none; }
        #previewArea img { max-width: 300px; max-height: 120px; border: 2px solid red; margin-bottom: 10px; display: block; }
        
        .control-btns { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .btn-group { display: flex; gap: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; border: none; border-radius: 4px; transition: background-color 0.2s; }
        #autoAnalyzeBtn { background-color: #ff5722; color: white; font-weight: bold; font-size: 18px; }
        #autoAnalyzeBtn:hover { background-color: #e64a19; }
        #downloadCsvBtn { background-color: #28a745; color: white; margin-top: 15px; }
        #downloadCsvBtn:hover { background-color: #218838; }
        #status { font-weight: bold; margin-top: 5px; color: #333; display: block; }
        
        #resultTable { width: 100%; margin-top: 20px; border-collapse: collapse; }
        #resultTable th, #resultTable td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        #resultTable th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>スプラ試合動画解析ツール 🚀</h1>
        <div class="flex-container">
            <div class="video-side">
                <p>① 動画ファイルを選択</p>
                <input type="file" id="videoInput" accept="video/*">
                <br>
                <video id="videoPlayer" controls crossorigin="anonymous"></video>
                <div class="control-btns">
                    <button id="autoAnalyzeBtn">⚡ 動画全体を超特急自動解析 (AIなし)</button>
                    <span id="status">動画を選択してください。</span>
                </div>
            </div>
            
            <div class="analyzer-side">
                <p>② 解析検知プレビュー (2値化済)</p>
                <div id="previewArea">
                    <p>【デス判定枠】</p>
                    <canvas id="canvasDeath" style="display:block; border:2px solid red; margin-bottom:10px; max-width:300px;"></canvas>
                    <p>【キル判定枠】</p>
                    <canvas id="canvasKill" style="display:block; border:2px solid red; max-width:300px;"></canvas>
                </div>
            </div>
        </div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
            <h2>📊 解析結果記録 (画像一致方式)</h2>
            <button id="downloadCsvBtn">CSVファイルをダウンロード</button>
        </div>
        
        <table id="resultTable">
            <thead>
                <tr>
                    <th>経過時間</th>
                    <th>判定イベント</th>
                    <th>一致度スコア</th>
                </tr>
            </thead>
            <tbody id="resultBody">
            </tbody>
        </table>
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const videoPlayer = document.getElementById('videoPlayer');
        const autoAnalyzeBtn = document.getElementById('autoAnalyzeBtn');
        const downloadCsvBtn = document.getElementById('downloadCsvBtn');
        const statusSpan = document.getElementById('status');
        const resultBody = document.getElementById('resultBody');
        
        const canvasDeath = document.getElementById('canvasDeath');
        const canvasKill = document.getElementById('canvasKill');

        // 1920x1080基準の各テロップの正確な文字位置
        const BASE_WIDTH = 1920;
        const BASE_ROI_DEATH = { x: 700, y: 345, w: 500, h: 220  }; // 「やられた！」の4文字付近
        const BASE_ROI_KILL  = { x: 800, y: 995, w: 50, h: 40}; // 「をたおした！」の6文字付近

        const analysisData = [];
        let isAnalyzing = false;

        // テンプレート画像の読み込み
        const imgKillTemplate = new Image(); imgKillTemplate.src = 'template_kill.png';
        const imgDeathTemplate = new Image(); imgDeathTemplate.src = 'template_death.png';

        videoInput.addEventListener('change', function(e) {
            if (e.target.files[0]) {
                videoPlayer.src = URL.createObjectURL(e.target.files[0]);
                statusSpan.textContent = '動画を読み込みました。いつでも解析可能です！';
            }
        });

        // 画像を完全な白黒（2値化）に変換する関数
        function binarizeContext(ctx, w, h) {
            const imgData = ctx.getImageData(0, 0, w, h);
            const data = imgData.data;
            for (let i = 0; i < data.length; i += 4) {
                const v = (0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2]);
                // 文字部分（白）を引き立たせるため、ある程度明るいピクセルだけを白(255)にする
                const color = (v > 160) ? 255 : 0;
                data[i] = data[i+1] = data[i+2] = color;
            }
            ctx.putImageData(imgData, 0, 0);
        }

        // 2つの白黒画像の一致度（％）を計算する関数
        function calculateMatchRate(ctxVideo, imgTemplate, w, h) {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w; tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(imgTemplate, 0, 0, w, h);
            binarizeContext(tempCtx, w, h); // テンプレート側も自動で完全白黒化

            const vData = ctxVideo.getImageData(0, 0, w, h).data;
            const tData = tempCtx.getImageData(0, 0, w, h).data;

            let matchPixels = 0;
            const totalPixels = w * h;

            for (let i = 0; i < vData.length; i += 4) {
                if (vData[i] === tData[i]) { // 白(255)同士、または黒(0)同士で一致しているか
                    matchPixels++;
                }
            }
            return (matchPixels / totalPixels) * 100;
        }

        // 動画の秒数を「00:00」の形式に変換する関数
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        async function analyzeFrameImageMatch() {
            const vWidth = videoPlayer.videoWidth;
            const vHeight = videoPlayer.videoHeight;
            const scale = vWidth / BASE_WIDTH;

            const cDeath = { x: BASE_ROI_DEATH.x * scale, y: BASE_ROI_DEATH.y * scale, w: BASE_ROI_DEATH.w * scale, h: BASE_ROI_DEATH.h * scale };
            const cKill  = { x: BASE_ROI_KILL.x * scale,  y: BASE_ROI_KILL.y * scale,  w: BASE_ROI_KILL.w * scale,  h: BASE_ROI_KILL.h * scale  };

            const mainCanvas = document.createElement('canvas');
            mainCanvas.width = vWidth; mainCanvas.height = vHeight;
            const mainCtx = mainCanvas.getContext('2d');
            mainCtx.drawImage(videoPlayer, 0, 0, vWidth, vHeight);

            // デス枠の切り出しと白黒化
            canvasDeath.width = cDeath.w; canvasDeath.height = cDeath.h;
            const ctxDeath = canvasDeath.getContext('2d');
            ctxDeath.drawImage(mainCanvas, cDeath.x, cDeath.y, cDeath.w, cDeath.h, 0, 0, cDeath.w, cDeath.h);
            binarizeContext(ctxDeath, cDeath.w, cDeath.h);

            // キル枠の切り出しと白黒化
            canvasKill.width = cKill.w; canvasKill.height = cKill.h;
            const ctxKill = canvasKill.getContext('2d');
            ctxKill.drawImage(mainCanvas, cKill.x, cKill.y, cKill.w, cKill.h, 0, 0, cKill.w, cKill.h);
            binarizeContext(ctxKill, cKill.w, cKill.h);

            // 一致度の計算
            const deathScore = calculateMatchRate(ctxDeath, imgDeathTemplate, cDeath.w, cDeath.h);
            const killScore = calculateMatchRate(ctxKill, imgKillTemplate, cKill.w, cKill.h);

            let eventType = '';
            let scoreStr = '';

            // 一致度が85%以上なら検知とみなす（環境に合わせて微調整可能）
            if (killScore > 85) {
                eventType = '⚔️ キル（たおした！）';
                scoreStr = `キル枠一致度: ${killScore.toFixed(1)}%`;
            } else if (deathScore > 85) {
                eventType = '💥 デス（やられた！）';
                scoreStr = `デス枠一致度: ${deathScore.toFixed(1)}%`;
            }

            if (eventType !== '') {
                const currentTimeStr = formatTime(videoPlayer.currentTime);
                const lastLog = analysisData[analysisData.length - 1];

                // 重複ログの防止
                if (!lastLog || lastLog.time !== currentTimeStr || lastLog.action !== eventType) {
                    analysisData.push({ time: currentTimeStr, action: eventType, score: scoreStr });

                    const newRow = document.createElement('tr');
                    newRow.innerHTML = `
                        <td><strong>${currentTimeStr}</strong></td>
                        <td><span style="background:#eee; border-radius:4px; padding:2px 6px; font-weight:bold;">${eventType}</span></td>
                        <td><span style="color:#666; font-size:0.9em;">${scoreStr}</span></td>
                    `;
                    resultBody.appendChild(newRow);
                }
            }
        }

        // 超特急自動解析ボタン
        autoAnalyzeBtn.addEventListener('click', async function() {
            if (!videoPlayer.src) return alert('動画を選択してください。');
            
            if (isAnalyzing) {
                isAnalyzing = false;
                autoAnalyzeBtn.textContent = '⚡ 動画全体を超特急自動解析 (AIなし)';
                statusSpan.textContent = '一時停止しました。';
                return;
            }

            isAnalyzing = true;
            autoAnalyzeBtn.textContent = '⏹️ 解析を停止する';
            videoPlayer.pause();
            videoPlayer.currentTime = 0;

            const waitForSeek = () => new Promise(resolve => videoPlayer.onseeked = resolve);

            // 1秒刻みの超高速ループ
            while (isAnalyzing && videoPlayer.currentTime < videoPlayer.duration) {
                const cur = videoPlayer.currentTime;
                statusSpan.textContent = `🚀 超特急解析中... ${formatTime(cur)} / ${formatTime(videoPlayer.duration)}`;

                await waitForSeek();
                await analyzeFrameImageMatch();

                videoPlayer.currentTime += 1.0; // 1秒進める
            }

            if (isAnalyzing) {
                isAnalyzing = false;
                autoAnalyzeBtn.textContent = '⚡ 動画全体を超特急自動解析 (AIなし)';
                statusSpan.textContent = '🏁 すべての超特急解析が完了しました！爆速でしたね！';
            }
        });

        // CSVダウンロード
        downloadCsvBtn.addEventListener('click', function() {
            if (analysisData.length === 0) return alert('データがありません。');
            let csv = '経過時間,判定イベント,詳細\n';
            analysisData.forEach(row => { csv += `"${row.time}","${row.action}","${row.score}"\n`; });
            const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
            const blob = new Blob([bom, csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `splatoon_fast_log_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        });
    </script>
</body>
</html>
